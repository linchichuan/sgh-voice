name: CI

on:
  push:
    branches: [main, "dev/*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # 安裝 runtime 必要套件（OpenCC / mlx-whisper 等可選元件在 CI 跳過）
          pip install openai anthropic numpy soundfile pyperclip flask opencc-python-reimplemented || true

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff (advisory)
        run: |
          ruff check . --select E,F,W,B --ignore E501 || true

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-config=/dev/null
