name: Deploy SGH Voice website to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: firebase-hosting-sgh-voice
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy live site
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SGH_MEISHI }}
          projectId: sgh-meishi
          target: sgh-voice
          channelId: live
          entryPoint: ./sgh-voice-web
